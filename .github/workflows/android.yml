name: Android APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          echo "Dummy build step for PinyinLens v3"

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: PinyinLens-APK
          path: .
